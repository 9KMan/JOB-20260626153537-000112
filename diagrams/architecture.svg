<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- CLIENT LAYER -->
  <text x="10" y="20" fill="#64748b" font-size="9" font-weight="600" letter-spacing="0.08em">CLIENT LAYER</text>
  <rect x="20" y="30" width="400" height="90" rx="10"
    fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="220" y="54" fill="white" font-size="12" font-weight="600" text-anchor="middle">Web Application / Portal</text>
  <text x="220" y="72" fill="#67e8f9" font-size="9" text-anchor="middle">KPI dashboards for internal teams</text>
  <text x="220" y="87" fill="#67e8f9" font-size="9" text-anchor="middle">Authenticated via Cognito user pool JWTs</text>
  <text x="220" y="102" fill="#e2e8f0" font-size="8" text-anchor="middle">HTTPS / REST + JSON · React / Next.js</text>

  <!-- Arrow: Client → API Gateway -->
  <line x1="220" y1="120" x2="220" y2="155" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="238" y="140" fill="#22d3ee" font-size="8">HTTPS / REST + JSON</text>

  <!-- API LAYER -->
  <text x="10" y="145" fill="#64748b" font-size="9" font-weight="600" letter-spacing="0.08em">API LAYER</text>
  <rect x="20" y="155" width="960" height="120" rx="10"
    fill="rgba(6,78,59,0.1)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="32" y="170" fill="#34d399" font-size="8" font-weight="600" letter-spacing="0.08em">AWS API GATEWAY + LAMBDA (FastAPI on Mangum)</text>

  <!-- API GW sub-components -->
  <rect x="40" y="180" width="200" height="80" rx="8"
    fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="140" y="202" fill="white" font-size="11" font-weight="600" text-anchor="middle">Auth Handler</text>
  <text x="140" y="218" fill="#6ee7b7" font-size="8" text-anchor="middle">Cognito JWT verifier</text>
  <text x="140" y="232" fill="#6ee7b7" font-size="8" text-anchor="middle">API Key validation</text>
  <text x="140" y="246" fill="#cbd5e1" font-size="7" text-anchor="middle">X-API-Key · Bearer token</text>

  <rect x="260" y="180" width="200" height="80" rx="8"
    fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="360" y="202" fill="white" font-size="11" font-weight="600" text-anchor="middle">CRUD Operations</text>
  <text x="360" y="218" fill="#6ee7b7" font-size="8" text-anchor="middle">DynamoDB single-table</text>
  <text x="360" y="232" fill="#6ee7b7" font-size="8" text-anchor="middle">PK/SK composite key design</text>
  <text x="360" y="246" fill="#cbd5e1" font-size="7" text-anchor="middle">Conditional writes</text>

  <rect x="480" y="180" width="200" height="80" rx="8"
    fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="580" y="202" fill="white" font-size="11" font-weight="600" text-anchor="middle">File Handler</text>
  <text x="580" y="218" fill="#6ee7b7" font-size="8" text-anchor="middle">S3 presigned URLs</text>
  <text x="580" y="232" fill="#6ee7b7" font-size="8" text-anchor="middle">Upload + download flows</text>
  <text x="580" y="246" fill="#cbd5e1" font-size="7" text-anchor="middle">multipart/form-data</text>

  <rect x="700" y="180" width="260" height="80" rx="8"
    fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="830" y="202" fill="white" font-size="11" font-weight="600" text-anchor="middle">Monday.com Integration</text>
  <text x="830" y="218" fill="#6ee7b7" font-size="8" text-anchor="middle">GraphQL v2 API · Outbound</text>
  <text x="830" y="232" fill="#6ee7b7" font-size="8" text-anchor="middle">Inbound webhooks · Task sync</text>
  <text x="830" y="246" fill="#cbd5e1" font-size="7" text-anchor="middle">Status: pending → done</text>

  <!-- Arrows between API sub-components -->
  <line x1="240" y1="220" x2="258" y2="220" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-emerald)"/>
  <line x1="460" y1="220" x2="478" y2="220" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-emerald)"/>
  <line x1="680" y1="220" x2="698" y2="220" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-emerald)"/>

  <!-- Arrow: API Layer → ETL Layer -->
  <line x1="220" y1="275" x2="220" y2="310" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="238" y="296" fill="#34d399" font-size="8">EventBridge / S3 events</text>

  <!-- ETL / DATA PROCESSING LAYER -->
  <text x="10" y="300" fill="#64748b" font-size="9" font-weight="600" letter-spacing="0.08em">ETL / DATA PROCESSING</text>
  <rect x="20" y="310" width="960" height="120" rx="10"
    fill="rgba(120,53,15,0.08)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="32" y="325" fill="#fbbf24" font-size="8" font-weight="600" letter-spacing="0.08em">EVENTBRIDGE + LAMBDA / BATCH</text>

  <!-- ETL sub-components -->
  <rect x="40" y="335" width="200" height="80" rx="8"
    fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="140" y="357" fill="white" font-size="11" font-weight="600" text-anchor="middle">Scheduled Batch</text>
  <text x="140" y="373" fill="#fde68a" font-size="8" text-anchor="middle">EventBridge cron triggers</text>
  <text x="140" y="387" fill="#fde68a" font-size="8" text-anchor="middle">Lender / Yardi imports</text>
  <text x="140" y="401" fill="#cbd5e1" font-size="7" text-anchor="middle">Batch.compute</text>

  <rect x="260" y="335" width="200" height="80" rx="8"
    fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="360" y="357" fill="white" font-size="11" font-weight="600" text-anchor="middle">S3 Event Triggers</text>
  <text x="360" y="373" fill="#fde68a" font-size="8" text-anchor="middle">ObjectCreated → Lambda</text>
  <text x="360" y="387" fill="#fde68a" font-size="8" text-anchor="middle">Idempotent via S3 etag</text>
  <text x="360" y="401" fill="#cbd5e1" font-size="7" text-anchor="middle">S3 → Lambda trigger</text>

  <rect x="480" y="335" width="200" height="80" rx="8"
    fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="580" y="357" fill="white" font-size="11" font-weight="600" text-anchor="middle">Document Parsers</text>
  <text x="580" y="373" fill="#fde68a" font-size="8" text-anchor="middle">pdfplumber · openpyxl · pandas</text>
  <text x="580" y="387" fill="#fde68a" font-size="8" text-anchor="middle">PDF, Excel, CSV ingestion</text>
  <text x="580" y="401" fill="#cbd5e1" font-size="7" text-anchor="middle">Raw → structured</text>

  <rect x="700" y="335" width="260" height="80" rx="8"
    fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="830" y="357" fill="white" font-size="11" font-weight="600" text-anchor="middle">Data Landing</text>
  <text x="830" y="373" fill="#fde68a" font-size="8" text-anchor="middle">S3 raw (versioned) + DynamoDB</text>
  <text x="830" y="387" fill="#fde68a" font-size="8" text-anchor="middle">Conditional writes · KMS</text>
  <text x="830" y="401" fill="#cbd5e1" font-size="7" text-anchor="middle">envelope encryption</text>

  <line x1="240" y1="375" x2="258" y2="375" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arrow-amber)"/>
  <line x1="460" y1="375" x2="478" y2="375" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arrow-amber)"/>
  <line x1="680" y1="375" x2="698" y2="375" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arrow-amber)"/>

  <!-- Arrow: ETL → Data Layer -->
  <line x1="220" y1="430" x2="220" y2="465" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="238" y="450" fill="#fbbf24" font-size="8">Structured data / KMS key</text>

  <!-- DATA LAYER -->
  <text x="10" y="455" fill="#64748b" font-size="9" font-weight="600" letter-spacing="0.08em">DATA LAYER</text>
  <rect x="20" y="465" width="960" height="90" rx="10"
    fill="rgba(76,29,149,0.1)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="32" y="480" fill="#a78bfa" font-size="8" font-weight="600" letter-spacing="0.08em">STORAGE LAYER</text>

  <rect x="40" y="490" width="280" height="55" rx="8"
    fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="180" y="512" fill="white" font-size="11" font-weight="600" text-anchor="middle">Amazon S3</text>
  <text x="180" y="528" fill="#c4b5fd" font-size="8" text-anchor="middle">Raw uploads (versioned) · Lifecycle → Glacier</text>

  <rect x="360" y="490" width="280" height="55" rx="8"
    fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="500" y="512" fill="white" font-size="11" font-weight="600" text-anchor="middle">Amazon DynamoDB</text>
  <text x="500" y="528" fill="#c4b5fd" font-size="8" text-anchor="middle">Single-table design · GSI patterns · Conditional writes</text>

  <rect x="680" y="490" width="280" height="55" rx="8"
    fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="820" y="512" fill="white" font-size="11" font-weight="600" text-anchor="middle">AWS KMS</text>
  <text x="820" y="528" fill="#c4b5fd" font-size="8" text-anchor="middle">Envelope encryption on sensitive fields</text>

  <!-- Arrow: Data Layer → External Integrations -->
  <line x1="220" y1="555" x2="220" y2="590" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="238" y="575" fill="#a78bfa" font-size="8">GraphQL / HTTP / Scheduled pull</text>

  <!-- EXTERNAL INTEGRATIONS LAYER -->
  <text x="10" y="580" fill="#64748b" font-size="9" font-weight="600" letter-spacing="0.08em">EXTERNAL INTEGRATIONS</text>
  <rect x="20" y="590" width="960" height="90" rx="10"
    fill="rgba(136,19,55,0.08)" stroke="#fb7185" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="32" y="605" fill="#fb7185" font-size="8" font-weight="600" letter-spacing="0.08em">THIRD-PARTY SERVICES</text>

  <rect x="40" y="612" width="280" height="55" rx="8"
    fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="180" y="634" fill="white" font-size="11" font-weight="600" text-anchor="middle">Monday.com</text>
  <text x="180" y="650" fill="#fda4af" font-size="8" text-anchor="middle">GraphQL v2 · Webhooks · Task status sync</text>

  <rect x="360" y="612" width="280" height="55" rx="8"
    fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="500" y="634" fill="white" font-size="11" font-weight="600" text-anchor="middle">Lender / Bank Portals</text>
  <text x="500" y="650" fill="#fda4af" font-size="8" text-anchor="middle">Per-vendor HTTP / CSV connectors</text>

  <rect x="680" y="612" width="280" height="55" rx="8"
    fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="820" y="634" fill="white" font-size="11" font-weight="600" text-anchor="middle">Yardi</text>
  <text x="820" y="650" fill="#fda4af" font-size="8" text-anchor="middle">Scheduled export pull + parser</text>

  <!-- LEGEND -->
  <text x="920" y="20" fill="white" font-size="9" font-weight="600">Legend</text>
  <rect x="920" y="32" width="14" height="9" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
  <text x="940" y="40" fill="#94a3b8" font-size="8">Frontend / Client</text>
  <rect x="920" y="47" width="14" height="9" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="940" y="55" fill="#94a3b8" font-size="8">API / Compute</text>
  <rect x="920" y="62" width="14" height="9" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="940" y="70" fill="#94a3b8" font-size="8">ETL / Processing</text>
  <rect x="920" y="77" width="14" height="9" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="940" y="85" fill="#94a3b8" font-size="8">Storage</text>
  <rect x="920" y="92" width="14" height="9" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="940" y="100" fill="#94a3b8" font-size="8">External / 3rd-party</text>
</svg>