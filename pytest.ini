[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    integration: end-to-end tests that exercise multiple components
    unit: isolated unit tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning